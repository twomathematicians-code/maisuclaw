<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>maisuclaw</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>M</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>maisuclaw</h2>
        <button id="new-chat-btn" title="New chat">+</button>
      </div>
      <div id="session-list"></div>
      <div class="sidebar-footer">
        <div id="model-badge"></div>
        <div id="backup-indicator" class="backup-off" title="GitHub backup"></div>
      </div>
    </aside>

    <!-- Main area -->
    <main id="main">
      <!-- Top bar -->
      <header id="topbar">
        <button id="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
        <span id="session-title">New Conversation</span>
        <div class="topbar-controls">
          <!-- Model selector -->
          <select id="model-select" title="Choose model tier">
            <!-- Populated dynamically from /info -->
          </select>
          <!-- Research mode button -->
          <button id="research-btn" class="research-btn" title="Deep research mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
              <line x1="11" y1="8" x2="11" y2="14"/>
            </svg>
            <span>Research</span>
          </button>
          <!-- Upload button -->
          <button id="upload-btn" class="upload-btn" title="Upload file (image, PDF, doc)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </button>
          <!-- Hidden file input triggered by upload-btn -->
          <input type="file" id="file-input" accept="image/*,.pdf,.txt,.md,.csv,.json,.py,.js" multiple hidden>
        </div>
      </header>

      <!-- Chat messages -->
      <div id="chat-container">
        <div id="messages"></div>
      </div>

      <!-- Preview area for uploaded images / pasted screenshots -->
      <div id="preview-area" style="display: none;">
        <div id="preview-list"></div>
      </div>

      <!-- Input area -->
      <div id="input-area">
        <button id="voice-btn" title="Record voice">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <textarea id="user-input" placeholder="Ask maisuclaw anything... (Ctrl+V to paste screenshot)" rows="1"></textarea>
        <button id="send-btn" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <!-- Full-screen drag & drop overlay -->
  <div id="drop-zone" class="drop-zone">
    <div class="drop-zone-content">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Drop files here</p>
      <span>Images, PDFs, and documents supported</span>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
